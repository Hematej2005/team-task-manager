<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f2f2f2;
        }

        header{
            width:100%;
            padding:15px 30px;
            background:#007bff;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        header h2{
            color:white;
        }

        header button{
            padding:10px 18px;
            border:none;
            background:red;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .container{
            width:95%;
            margin:30px auto;
        }

        .project-box{
            background:white;
            padding:25px;
            border-radius:10px;
            margin-bottom:30px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .project-box h2{
            margin-bottom:15px;
        }

        .form-container{
            background:white;
            padding:25px;
            border-radius:10px;
            margin-bottom:30px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .form-container h2{
            margin-bottom:20px;
        }

        .form-group{
            margin-top:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,textarea,select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:150px;
        }

        .row{
            display:flex;
            gap:20px;
            margin-top:20px;
        }

        .row .form-group{
            width:50%;
            margin-top:0;
        }

        .create-btn{
            width:100%;
            padding:14px;
            margin-top:25px;
            border:none;
            background:green;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .task-section h2{
            margin-bottom:20px;
        }

        .task-card{
            background:white;
            padding:18px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            cursor:pointer;
        }

        .task-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .arrow{
            font-size:22px;
            font-weight:bold;
        }

        .task-details{
            display:none;
            margin-top:15px;
            border-top:1px solid #ddd;
            padding-top:15px;
        }

        .task-details p{
            margin-top:10px;
        }

        #message{
            margin-top:20px;
            font-size:16px;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        .overdue{
            color:red;
            font-weight:bold;
        }

        @media(max-width:768px){

            .row{
                flex-direction:column;
            }

            .row .form-group{
                width:100%;
            }

        }

    </style>

</head>
<body>

<header>

    <h2>Project Details</h2>

    <button id="logoutBtn">
        Logout
    </button>

</header>

<div class="container">

    <div class="project-box">

        <h2 id="projectName"></h2>

        <p id="projectDescription"></p>

    </div>

    <div class="form-container">

        <h2>Create Task</h2>

        <form id="taskForm">

            <div class="form-group">

                <label>
                    Task Title
                </label>

                <input
                        type="text"
                        id="title"
                        placeholder="Enter Task Title"
                        required
                >

            </div>

            <div class="form-group">

                <label>
                    Task Description
                </label>

                <textarea
                        id="description"
                        placeholder="Enter Task Description"
                        required
                ></textarea>

            </div>

            <div class="row">

                <div class="form-group">

                    <label>
                        Select Member
                    </label>

                    <select id="memberSelect" required>

                        <option value="">
                            Select Member
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Deadline
                    </label>

                    <input
                            type="date"
                            id="deadline"
                            required
                    >

                </div>

            </div>

            <button type="submit" class="create-btn">
                Create Task
            </button>

            <p id="message"></p>

        </form>

    </div>

    <div class="task-section">

        <h2>Tasks</h2>

        <div id="taskContainer"></div>

    </div>

</div>

<script>

    const logoutBtn=document.getElementById("logoutBtn");

    const taskForm=document.getElementById("taskForm");

    const taskContainer=document.getElementById("taskContainer");

    const message=document.getElementById("message");

    const urlParams=new URLSearchParams(window.location.search);

    const projectId=urlParams.get("id");

    document.getElementById("deadline")
    .addEventListener("click",function(){

        this.showPicker();

    });

    logoutBtn.addEventListener("click",async function(){

        message.innerText="";
        message.className="";

        try{

            const response=await fetch("/api/auth/logout",{

                method:"POST",

                credentials:"include"

            });

            if(response.ok){

                message.innerText="Logout successful";

                message.classList.add("success");

                setTimeout(function(){

                    window.location.href="login.html";

                },1000);

            }

        }catch(error){

            message.innerText="Something went wrong";

            message.classList.add("error");

        }

    });

    async function loadProject(){

        try{

            const response=await fetch(
            `/api/admin/projects/${projectId}`,
            {
                credentials:"include"
            });

            const project=await response.json();

            document.getElementById("projectName").innerText=
            project.projectName;

            document.getElementById("projectDescription").innerText=
            project.description;

        }catch(error){

            message.innerText="Failed to load project";

            message.classList.add("error");

        }

    }

    async function loadUsers(){

        try{

            const response=await fetch(
            "/api/admin/projects/users",
            {
                credentials:"include"
            });

            const users=await response.json();

            const memberSelect=document.getElementById("memberSelect");

            users.forEach(function(user){

                const option=document.createElement("option");

                option.value=user.id;

                option.textContent=user.name;

                memberSelect.appendChild(option);

            });

        }catch(error){

            message.innerText="Failed to load members";

            message.classList.add("error");

        }

    }

    taskForm.addEventListener("submit",async function(event){

        event.preventDefault();

        message.innerText="";
        message.className="";

        const taskData={

            title:document.getElementById("title").value,
            description:document.getElementById("description").value,
            assignedMemberId:document.getElementById("memberSelect").value,
            deadline:document.getElementById("deadline").value,
            projectId:projectId

        };

        try{

            const response=await fetch(
            "/api/admin/tasks",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify(taskData)

            });

            if(response.ok){

                message.innerText="Task created successfully";

                message.classList.add("success");

                taskForm.reset();

                loadTasks();

            }else{

                message.innerText="Failed to create task";

                message.classList.add("error");

            }

        }catch(error){

            message.innerText="Something went wrong";

            message.classList.add("error");

        }

    });

    async function loadTasks(){

        try{

            const response=await fetch(
            `/api/admin/tasks/project/${projectId}`,
            {
                credentials:"include"
            });

            const tasks=await response.json();

            taskContainer.innerHTML="";

            tasks.forEach(function(task,index){

                const card=document.createElement("div");

                card.classList.add("task-card");

                const today=new Date();

                const deadlineDate=new Date(task.deadline);

                today.setHours(0,0,0,0);

                deadlineDate.setHours(0,0,0,0);

                let overdueText="";

                if(deadlineDate < today && task.status!=="COMPLETED"){

                    overdueText=`
                        <p class="overdue">
                            Overdue Task
                        </p>
                    `;

                }

                card.innerHTML=`

                    <div class="task-header">

                        <h3>
                            Task ${index+1} : ${task.title}
                        </h3>

                        <span class="arrow">
                            ▼
                        </span>

                    </div>

                    <div class="task-details">

                        <p><b>Description:</b> ${task.description}</p>

                        <p><b>Assigned Member:</b> ${task.assignedMember}</p>

                        <p><b>Admin:</b> ${task.adminName}</p>

                        <p><b>Project:</b> ${task.projectName}</p>

                        <p><b>Deadline:</b> ${task.deadline}</p>

                        <p><b>Status:</b> ${task.status}</p>

                        ${overdueText}

                    </div>

                `;

                card.addEventListener("click",function(){

                    const details=
                    card.querySelector(".task-details");

                    if(details.style.display==="block"){

                        details.style.display="none";

                    }else{

                        details.style.display="block";

                    }

                });

                taskContainer.appendChild(card);

            });

        }catch(error){

            message.innerText="Failed to load tasks";

            message.classList.add("error");

        }

    }

    loadProject();

    loadUsers();

    loadTasks();

</script>

</body>
</html>
