<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f2f2f2;
        }

        .container{
            width:350px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        p{
            margin-top:15px;
            text-align:center;
        }

        a{
            text-decoration:none;
            color:blue;
        }

        #message{
            margin-top:15px;
            text-align:center;
            font-size:15px;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Signup</h2>

    <form id="signupForm">

        <input
                type="text"
                id="name"
                placeholder="Enter Name"
                required
        >

        <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
        >

        <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
        >

        <select id="role" required>

            <option value="">
                Select Role
            </option>

            <option value="ADMIN">
                ADMIN
            </option>

            <option value="MEMBER">
                MEMBER
            </option>

        </select>

        <button type="submit">
            Signup
        </button>

    </form>

    <p id="message"></p>

    <p>
        Already have account?
        <a href="login.html">Login</a>
    </p>

</div>

<script>

    const signupForm=document.getElementById("signupForm");

    const message=document.getElementById("message");

    signupForm.addEventListener("submit",async function(event){

        event.preventDefault();

        message.innerText="";
        message.className="";

        const name=document.getElementById("name").value.trim();

        const email=document.getElementById("email").value.trim();

        const password=document.getElementById("password").value.trim();

        const role=document.getElementById("role").value;

        if(
            name==="" ||
            email==="" ||
            password==="" ||
            role===""
        ){

            message.innerText="Please fill all fields";

            message.classList.add("error");

            return;
        }

        const userData={

            name:name,
            email:email,
            password:password,
            role:role

        };

        try{

            const response=await fetch("/api/auth/signup",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify(userData)

            });

            const data=await response.json();

            if(response.ok){

                message.innerText="Signup successful";

                message.classList.add("success");

                setTimeout(function(){

                    if(data.role==="ADMIN"){

                        window.location.href="admin.html";

                    }else{

                        window.location.href="member.html";

                    }

                },1000);

            }else{

                message.innerText=data.message;

                message.classList.add("error");

            }

        }catch(error){

            message.innerText="Something went wrong";

            message.classList.add("error");

        }

    });

</script>

</body>
</html>
