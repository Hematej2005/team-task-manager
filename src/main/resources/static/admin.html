<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f2f2f2;
        }

        header{
            width:100%;
            padding:15px 30px;
            background:#007bff;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        header h2{
            font-size:24px;
        }

        header button{
            padding:10px 18px;
            border:none;
            background:red;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .container{
            width:90%;
            margin:30px auto;
        }

        .top-section{
            margin-bottom:25px;
        }

        .top-section button{
            padding:12px 20px;
            border:none;
            background:green;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .project-container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .project-card{
            width:250px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .project-card h3{
            margin-bottom:15px;
        }

        .project-card button{
            padding:10px 15px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        #message{
            margin-bottom:20px;
            font-size:16px;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

    </style>

</head>
<body>

<header>

    <h2>Admin Dashboard</h2>

    <button id="logoutBtn">Logout</button>

</header>

<div class="container">

    <p id="message"></p>

    <div class="top-section">

        <button id="createProjectBtn">
            Create Project
        </button>

    </div>

    <div class="project-container" id="projectContainer">

    </div>

</div>

<script>

    const createProjectBtn=document.getElementById("createProjectBtn");

    const logoutBtn=document.getElementById("logoutBtn");

    const projectContainer=document.getElementById("projectContainer");

    const message=document.getElementById("message");

    createProjectBtn.addEventListener("click",function(){

        window.location.href="create-project.html";

    });

    logoutBtn.addEventListener("click",async function(){

        message.innerText="";
        message.className="";

        try{

            const response=await fetch("/api/auth/logout",{

                method:"POST",

                credentials:"include"

            });

            if(response.ok){

                message.innerText="Logout successful";

                message.classList.add("success");

                setTimeout(function(){

                    window.location.href="login.html";

                },1000);

            }else{

                message.innerText="Logout failed";

                message.classList.add("error");

            }

        }catch(error){

            message.innerText="Something went wrong";

            message.classList.add("error");

        }

    });

    async function loadProjects(){

        message.innerText="";
        message.className="";

        try{

            const response=await fetch("/api/admin/projects",{

                method:"GET",

                credentials:"include"

            });

            if(!response.ok){

                message.innerText="Failed to load projects";

                message.classList.add("error");

                return;
            }

            const projects=await response.json();

            projectContainer.innerHTML="";

            if(projects.length===0){

                projectContainer.innerHTML=
                "<p>No Projects Found</p>";

                return;
            }

            projects.forEach(function(project){

                const card=document.createElement("div");

                card.classList.add("project-card");

                card.innerHTML=`

                    <h3>${project.projectName}</h3>

                    <button onclick="openProject(${project.id})">
                        Click Here
                    </button>

                `;

                projectContainer.appendChild(card);

            });

        }catch(error){

            message.innerText="Something went wrong";

            message.classList.add("error");

        }

    }

    function openProject(projectId){

        window.location.href=
        `project-details.html?id=${projectId}`;

    }

    loadProjects();

</script>

</body>
</html>
